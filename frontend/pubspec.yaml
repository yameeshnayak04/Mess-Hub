name: mess_management_app
description: A modern mess management system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  
  # Routing
  go_router: ^12.1.3
  
  # Storage
  flutter_secure_storage: ^9.0.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  table_calendar: ^3.0.9
  pinput: ^4.0.0
  lottie: ^3.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.3
  
  # Utilities
  intl: ^0.19.0
  geolocator: ^11.0.0
  permission_handler: ^11.2.0
  geocoding: ^4.0.0
  flutter_map_dragmarker: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation (only for Riverpod)
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
