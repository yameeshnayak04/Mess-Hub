# .github/workflows/cron.yml
name: Cron Triggers

on:
  schedule:
    # Absent every 30 minutes (UTC)
    - cron: '*/30 * * * *'
    # Billing window: 18:30 UTC on days 28–31
    - cron: '30 18 28-31 * *'
  workflow_dispatch: {}

jobs:
  absent:
    # Run only for the */30 schedule or on manual dispatch
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering Absent Job..."
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"

  billing:
    # Run only for schedule or manual dispatch; date guard controls the actual execution
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - id: guard
        name: Run only when tomorrow in IST is 01
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Asia/Kolkata date -d 'tomorrow' +%d)" = "01" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Billing Job
        if: steps.guard.outputs.run == 'true'
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering Billing Job..."
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"
      - name: Skip Billing Job
        if: steps.guard.outputs.run == 'false'
        run: echo "Not the 1st in IST; skipping."
