name: Cron Triggers
on:
  schedule:
    - cron: '*/30 * * * *'      # Absent every 30 min
    - cron: '30 18 * * *'       # Daily near 00:00 IST; guard below
  workflow_dispatch: {}

jobs:
  absent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"

  billing:
    runs-on: ubuntu-latest
    steps:
      - id: guard
        name: "Guard: 00:00 Asia/Kolkata on day 1"
        run: |
          d=$(TZ=Asia/Kolkata date +%d)
          hm=$(TZ=Asia/Kolkata date +%H:%M)
          if [ "$d" = "01" ] && [ "$hm" = "00:00" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Billing Job
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"
