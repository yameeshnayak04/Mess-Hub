name: Cron Triggers

on:
  schedule:
    - cron: '*/30 * * * *'        # Absent (UTC)
    - cron: '30 18 28-31 * *'     # Window that maps to 00:00 IST on the 1st
  workflow_dispatch: {}

jobs:
  absent:
    if: github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"

  billing:
    if: github.event_name == 'schedule' && startsWith(github.event.schedule, '30 18')
    runs-on: ubuntu-latest
    steps:
      - id: guard
        name: Run only when tomorrow in IST is the 1st
        run: |
          if [ "$(TZ=Asia/Kolkata date -d 'tomorrow' +%d)" = "01" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Billing Job
        if: steps.guard.outputs.run == 'true'
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"
      - name: Skip (not the 1st IST)
        if: steps.guard.outputs.run == 'false'
        run: |
          echo "Skipping: not the 1st in IST."
