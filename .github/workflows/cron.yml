name: Cron Triggers

on:
  schedule:
    # 1. Runs every 30 minutes (for Absent Job)
    - cron: '*/30 * * * *'
    # 2. Runs daily at 18:31 UTC (which is 00:01 AM IST)
    - cron: '31 18 * * *'
  workflow_dispatch: {}

jobs:
  # JOB 1: Absent Job (runs every 30 minutes)
  absent:
    # This 'if' condition ensures this job ONLY runs on the 30-min schedule
    if: github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"

  # JOB 2: Billing Job (runs at 00:01 IST, but only on the 1st)
  billing:
    # This 'if' condition ensures this job ONLY runs on the daily 00:01 IST schedule
    if: github.event.schedule == '31 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - id: guard
        name: "Guard: Check if it is the 1st of the month in India"
        run: |
          # This checks the current date in Kolkata.
          # If it's "01", it sets the output 'run' to true.
          if [ "$(TZ=Asia/Kolkata date +%d)" = "01" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Billing Job
        # This step only runs if the guard output 'run' was true
        if: ${{ steps.guard.outputs.run == 'true' }}
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "It is the 1st of the month. Running billing job..."
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"
      - name: Skip Billing Job
        # This step runs if the guard was false
        if: ${{ steps.guard.outputs.run == 'false' }}
        run: |
          echo "It is not the 1st of the month. Skipping billing job."