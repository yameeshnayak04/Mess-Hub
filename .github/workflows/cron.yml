name: Cron Triggers

on:
  schedule:
    - cron: '*/30 * * * *'     # Absent job every 30 minutes (UTC schedule)
    - cron: '31 18 * * *'      # Fire once daily near 00:01 IST; guarded below
  workflow_dispatch: {}

jobs:
  absent:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up service
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Service not ready"; exit 1
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"

  billing:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up service
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Service not ready"; exit 1
      - name: "Guard: only at 00:01 Asia/Kolkata on day 1"
        run: |
          d=$(TZ=Asia/Kolkata date +%d)
          hm=$(TZ=Asia/Kolkata date +%H:%M)
          if [ "$d" = "01" ] && [ "$hm" = "00:01" ]; then
            echo "OK to run"
          else
            echo "Skip run (local=$d $hm)"; exit 78
          fi
      - name: Trigger Billing Job
        if: ${{ success() }}
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"
