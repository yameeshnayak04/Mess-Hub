# .github/workflows/cron.yml
name: Cron Triggers

on:
  schedule:
    # Absent Job (unchanged): every 30 minutes
    - cron: '*/30 * * * *'

    # Billing Job: run at 18:30 UTC on the last day of each month (00:00 IST on the 1st)
    - cron: '30 18 31 1,3,5,7,8,10,12 *'  # Months with 31 days
    - cron: '30 18 30 4,6,9,11 *'         # Months with 30 days
    - cron: '30 18 28 2 *'                # February (non-leap years)
    - cron: '30 18 29 2 *'                # February (leap years)

  workflow_dispatch: {}

jobs:
  absent:
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering Absent Job..."
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"

  billing:
    if: github.event_name == 'workflow_dispatch' || 
        github.event.schedule == '30 18 31 1,3,5,7,8,10,12 *' || 
        github.event.schedule == '30 18 30 4,6,9,11 *' || 
        github.event.schedule == '30 18 28 2 *' || 
        github.event.schedule == '30 18 29 2 *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Billing Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Triggering Billing Job..."
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" -H "Accept: application/json"
