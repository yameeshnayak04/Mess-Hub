name: Cron Triggers

on:
  schedule:
    - cron: '*/30 * * * *'        # every 30 min: Absent
    - cron: '1 0 1 * *'         # 00:01 UTC on the 1st of every month: Billing
  workflow_dispatch: {}

jobs:
  absent:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up service
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Service not ready"; exit 1
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"

  billing:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up service
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Service not ready"; exit 1
      - name: Trigger Billing Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"
