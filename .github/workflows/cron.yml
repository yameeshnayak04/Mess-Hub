name: Cron Triggers

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes: trigger absent job
    - cron: '1 0 1 * *'    # at 00:01 on the 1st of every month: trigger billing job
  workflow_dispatch: {}

jobs:
  absent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Absent Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}   # e.g., https://your-service.onrender.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          curl -fsS -X POST "$BASE_URL/api/cron/absent/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"

  billing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Billing Job
        env:
          BASE_URL: ${{ secrets.RENDER_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          curl -fsS -X POST "$BASE_URL/api/cron/billing/run" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Accept: application/json"
